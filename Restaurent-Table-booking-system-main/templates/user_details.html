{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/user_details.css') }}">
{% endblock %}

{% block content %}

<section class="reserve-section">

  <!-- Icon -->
  <div class="reserve-icon">
    <span>🍽️</span>
  </div>

  <!-- Title -->
  <h1>Reserve Your Table</h1>
  <p class="subtitle">Welcome! Please enter your details to continue</p>

  <!-- Form -->
  <div class="reserve-card">
    <form method="POST" onsubmit="return validateForm()">

      <!-- Name -->
      <label>Full Name</label>
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input
          type="text"
          name="name"
          placeholder="Enter your full name"
          required
          minlength="3"
        >
      </div>

      <!-- Phone -->
      <label>Phone Number</label>
      <div class="input-group">
        <span class="input-icon">📞</span>
        <input
          type="tel"
          name="phone"
          placeholder="Enter 10 digit number"
          pattern="[0-9]{10}"
          required
        >
      </div>

      <!-- Email -->
      <label>Email Address</label>
      <div class="input-group">
        <span class="input-icon">✉️</span>
        <input
          type="email"
          name="email"
          placeholder="your.email@example.com"
          required
        >
      </div>

      <!-- Submit -->
      <button type="submit" class="reserve-btn">
        Proceed to Booking
      </button>

    </form>
  </div>

  <p class="security-text">
    Your information is secure and used only for reservation purposes
  </p>

</section>

<!-- ================= JS VALIDATION ================= -->
<script>
function validateForm() {
    let name = document.forms[0]["name"].value;
    let phone = document.forms[0]["phone"].value;

    if (name.length < 3) {
        alert("Name must be at least 3 characters");
        return false;
    }

    if (!/^\d{10}$/.test(phone)) {
        alert("Phone number must be exactly 10 digits");
        return false;
    }

    return true;
}
</script>

{% endblock %}
